services:
  - type: web
    name: bilingual-host-ai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: CORS_ORIGINS
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: IFLYTEK_APP_ID
        sync: false
      - key: IFLYTEK_API_KEY
        sync: false
      - key: IFLYTEK_API_SECRET
        sync: false
