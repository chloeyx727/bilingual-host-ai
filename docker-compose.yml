services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./deployment/server.env
    environment:
      DATABASE_URL: sqlite:////data/bilingual_host.db
      CHROMA_PERSIST_DIR: /data/chroma_data
      CORS_ORIGINS: ""
    volumes:
      - backend_data:/data

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  backend_data:
